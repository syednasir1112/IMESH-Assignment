apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: imesh-tls-cert
  namespace: default
spec:
  secretName: imesh-tls-secret
  duration: 2160h
  renewBefore: 360h
  dnsNames:
  - web.company.local
  - api.company.local
  - test.company.local
  - "*.company.local"
  issuerRef:
    name: imesh-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
